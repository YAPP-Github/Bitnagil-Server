name: Deploy to Amazon ECS

# release, develop 브랜치에 푸시되거나 PR이 닫힐 때마다 실행되는 워크플로우입니다.
on:
  push:
    branches:
      - "release"
      - "develop"

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      # 1. JDK 17 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. 환경변수(yml)가 있는 서브모듈 가져오기
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACTION_TOKEN }}
          submodules: true

      # 2-1. 환경변수(yml) 파일이 있는지 확인
      - name: Check if config files exist - dev
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "Current Directory: $(pwd)"
          cd config
          echo "Current Directory: $(pwd)"
          cd dev
          echo "Current Directory: $(pwd)"
          ls -al

      - name: Check if config files exist - prod
        if: github.ref == 'refs/heads/release'
        run: |
          echo "Current Directory: $(pwd)"
          cd config
          echo "Current Directory: $(pwd)"
          cd prod
          echo "Current Directory: $(pwd)"
          ls -al

      # 3. AWS 자격 증명 구성
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

#      # 4. AWS CLI 설치 (사전 설치되어 있지 않은 경우)
